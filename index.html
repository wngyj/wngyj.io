<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>叶宁的小屋</title>
    <style>
        /* 基础重置与字体 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Poppins', system-ui, -apple-system, sans-serif;
            background-color: #0a0c0f;
            color: #ffffff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1e24;
        }
        ::-webkit-scrollbar-thumb {
            background: #3f4a5a;
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a6b80;
        }

        /* 入场动画（丝滑reveal） */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.9s cubic-bezier(0.2, 0.9, 0.1, 1), transform 0.9s cubic-bezier(0.2, 0.9, 0.1, 1);
            /* 不添加 will-change，交由浏览器自动优化 */
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 背景光晕（无模糊，纯渐变叠加） */
        .bg-glow {
            position: fixed;
            top: -20%;
            left: -10%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle at 30% 30%, rgba(70, 130, 200, 0.25), transparent 70%);
            z-index: -2;
            pointer-events: none;
        }
        .bg-glow-2 {
            position: fixed;
            bottom: -10%;
            right: -5%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle at 70% 70%, rgba(150, 100, 220, 0.2), transparent 70%);
            z-index: -2;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
            position: relative;
            z-index: 2;
        }

        /* Hero 区域 */
        .hero {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 0 2rem;
        }

        .domain-badge {
            display: inline-block;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #a0a8b8;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            margin-bottom: 2rem;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .big-number {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.2rem 0.5rem;
            margin-bottom: 1.5rem;
            font-size: clamp(4rem, 15vw, 9rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: 0px;
        }

        .digit {
            display: inline-block;
            background: linear-gradient(145deg, #ffffff, #c0ccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(90, 160, 255, 0.5);
            animation: floatGlow 4s infinite alternate ease-in-out;
            /* 只对动画属性做 will-change 提示，不滥用 */
            will-change: transform, text-shadow;
        }

        .digit:nth-child(1) { animation-delay: 0s; }
        .digit:nth-child(2) { animation-delay: 0.2s; }
        .digit:nth-child(3) { animation-delay: 0.4s; }
        .digit:nth-child(4) { animation-delay: 0.6s; }
        .digit:nth-child(5) { animation-delay: 0.8s; }
        .digit:nth-child(6) { animation-delay: 1s; }

        @keyframes floatGlow {
            0% { text-shadow: 0 0 20px rgba(0, 200, 255, 0.5); transform: translateY(0px); }
            100% { text-shadow: 0 0 40px rgba(180, 130, 255, 0.8); transform: translateY(-5px); }
        }

        .subhead {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: #cbd5e6;
            max-width: 700px;
            margin: 1.5rem auto 0;
            font-weight: 300;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 2rem;
        }

        /* 解释卡片网格 */
        .meaning-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 2rem;
            margin: 5rem 0 6rem;
        }

        .meaning-card {
            background: rgba(20, 25, 35, 0.8);  /* 纯色半透明，无backdrop-filter */
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 32px;
            padding: 2rem 1rem 1.8rem;
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03) inset;
            cursor: default;
        }

        .meaning-card:hover {
            transform: translateY(-8px);
            border-color: rgba(100, 180, 255, 0.3);
            box-shadow: 0 30px 40px -15px rgba(0, 180, 255, 0.25), 0 0 0 1px rgba(100, 180, 255, 0.1) inset;
        }

        .card-number {
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #fff, #b0d0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 12px rgba(0,160,255,0.5));
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #d2e5ff;
            margin-bottom: 0.75rem;
        }

        .card-desc {
            font-size: 0.95rem;
            color: #9aaec9;
            max-width: 200px;
            margin: 0 auto;
            line-height: 1.5;
            font-weight: 300;
        }

        /* 开发者签名 */
        .signature {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem 0 1rem;
            font-size: 1.4rem;
            color: #b5c8e0;
            position: relative;
        }

        .signature::before {
            content: '';
            display: block;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #5f9eff, #b78aff, transparent);
            margin: 0 auto 2rem;
            border-radius: 2px;
        }

        .signature strong {
            font-weight: 600;
            color: white;
            background: linear-gradient(145deg, #ffffff, #b0d5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-left: 0.5rem;
        }

        /* 微小的装饰线条 - 静态 */
        .dot-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .meaning-grid {
                gap: 1.2rem;
            }
            .meaning-card {
                padding: 1.5rem 0.5rem;
            }
            .card-number {
                font-size: 2.8rem;
            }
            .card-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- 背景光晕（无模糊） -->
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>
    <div class="dot-pattern"></div>

    <main class="container">
        <!-- HERO 区域 -->
        <section class="hero">
            <span class="domain-badge reveal">211816.xyz</span>
            <div class="big-number reveal">
                <span class="digit">2</span>
                <span class="digit">1</span>
                <span class="digit">1</span>
                <span class="digit">8</span>
                <span class="digit">1</span>
                <span class="digit">6</span>
            </div>
            <p class="subhead reveal">每一个数字，都是一段旅程</p>
        </section>

        <!-- 数字解释卡片网格 -->
        <section class="meaning-grid">
            <div class="meaning-card reveal">
                <div class="card-number">2</div>
                <div class="card-title">双向</div>
                <div class="card-desc">爱与被爱，同时发生<br>彼此奔赴，成就共赢</div>
            </div>
            <div class="meaning-card reveal">
                <div class="card-number">1</div>
                <div class="card-title">起点</div>
                <div class="card-desc">千里之行，始于足下<br>初心不忘，方得始终</div>
            </div>
            <div class="meaning-card reveal">
                <div class="card-number">1</div>
                <div class="card-title">坚持</div>
                <div class="card-desc">日日不断，滴水穿石<br>久久为功，玉汝于成</div>
            </div>
            <div class="meaning-card reveal">
                <div class="card-number">8</div>
                <div class="card-title">无限</div>
                <div class="card-desc">∞ 可能，永无止境<br>探索未知，生生不息</div>
            </div>
            <div class="meaning-card reveal">
                <div class="card-number">1</div>
                <div class="card-title">热爱</div>
                <div class="card-desc">心之所向，素履以往<br>满腔热忱，可抵岁月漫长</div>
            </div>
            <div class="meaning-card reveal">
                <div class="card-number">6</div>
                <div class="card-title">顺遂</div>
                <div class="card-desc">万事胜意，顺遂无虞<br>皆得所愿，平安喜乐</div>
            </div>
        </section>

        <!-- 开发者签名：叶宁 -->
        <div class="signature reveal">
            Design & Development <strong>叶宁</strong>
        </div>
    </main>

    <script>
        (function() {
            // 丝滑滚动显示动画
            const revealElements = document.querySelectorAll('.reveal');
            
            if (revealElements.length > 0) {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                        }
                    });
                }, { 
                    threshold: 0.2,
                    rootMargin: '0px 0px -20px 0px'
                });

                revealElements.forEach(el => observer.observe(el));
            }

            // 为卡片依次附加延迟（仅视觉趣味）
            const cards = document.querySelectorAll('.meaning-card');
            cards.forEach((card, index) => {
                card.style.transitionDelay = `${index * 0.08}s`; // 稍快一点
            });
        })();
    </script>
</body>
</html>
